    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="60" width="1064" height="510" rx="32" fill="#10131a" stroke="#2f3643"/>
  <rect x="792" y="122" width="250" height="90" rx="24" fill="#1d2430"/>
  <text x="846" y="179" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">KOREA</text>
  <line x1="820" y1="246" x2="1024" y2="450" stroke="#e82127" stroke-width="18" stroke-linecap="round"/>
