<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1260" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101D2B"/>
      <stop offset="1" stop-color="#13273B"/>
    </linearGradient>
    <linearGradient id="left" x1="120" y1="190" x2="640" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18314B"/>
      <stop offset="1" stop-color="#13304A"/>
    </linearGradient>
    <linearGradient id="right" x1="760" y1="190" x2="1280" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B3044"/>
      <stop offset="1" stop-color="#16324A"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="760" rx="40" fill="url(#bg)"/>
  <rect x="84" y="74" width="1232" height="612" rx="36" fill="#0E1823" stroke="#2A4560"/>

  <text x="700" y="140" text-anchor="middle" fill="#F3F7FB" font-size="48" font-weight="700" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">MCP와 A2A를 가장 쉽게 구분하는 법</text>

  <rect x="130" y="190" width="510" height="420" rx="28" fill="url(#left)" stroke="#406789"/>
  <rect x="760" y="190" width="510" height="420" rx="28" fill="url(#right)" stroke="#50759B"/>

  <text x="385" y="264" text-anchor="middle" fill="#F4FAFF" font-size="40" font-weight="700" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">MCP</text>
  <text x="385" y="304" text-anchor="middle" fill="#B9D9F6" font-size="24" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">에이전트가 도구와 데이터에 붙는 방식</text>

  <text x="1015" y="264" text-anchor="middle" fill="#F4FAFF" font-size="40" font-weight="700" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">A2A</text>
  <text x="1015" y="304" text-anchor="middle" fill="#B9D9F6" font-size="24" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">에이전트가 다른 에이전트와 협업하는 방식</text>

  <rect x="188" y="354" width="394" height="86" rx="20" fill="#0E1A28" stroke="#5C86A9"/>
  <text x="385" y="408" text-anchor="middle" fill="#E9F5FF" font-size="30" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">DB 조회 / 파일 읽기 / 검색</text>

  <rect x="188" y="470" width="394" height="86" rx="20" fill="#0E1A28" stroke="#5C86A9"/>
  <text x="385" y="524" text-anchor="middle" fill="#E9F5FF" font-size="30" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">짧고 구조화된 호출</text>

  <rect x="818" y="354" width="394" height="86" rx="20" fill="#0E1A28" stroke="#75A4C8"/>
  <text x="1015" y="408" text-anchor="middle" fill="#E9F5FF" font-size="30" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">위임 / 협상 / 상태 공유</text>

