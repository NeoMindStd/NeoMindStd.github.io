  <text x="118" y="210" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700">Tesla Referral Status</text>
  <text x="118" y="282" fill="#d6dbe6" font-family="Segoe UI, Arial, sans-serif" font-size="34">Korea is inactive, but some overseas markets are still live</text>
