  <text x="1015" y="524" text-anchor="middle" fill="#E9F5FF" font-size="30" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">멀티 턴 협업과 장기 작업</text>

  <path d="M640 400L760 400" stroke="#8BD8FF" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 12"/>
  <path d="M640 518L760 518" stroke="#6DE7C5" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 12"/>

  <text x="700" y="393" text-anchor="middle" fill="#DDF5FF" font-size="24" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">한 에이전트 안쪽</text>
  <text x="700" y="511" text-anchor="middle" fill="#DDF5FF" font-size="24" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">에이전트와 에이전트 사이</text>

  <text x="700" y="678" text-anchor="middle" fill="#C9DDF1" font-size="28" font-family="'Segoe UI', 'Malgun Gothic', sans-serif">툴 호출이 핵심이면 MCP, 역할 분담과 협업이 핵심이면 A2A</text>
