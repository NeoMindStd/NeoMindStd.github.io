<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" fill="none">
  <rect width="1600" height="760" rx="36" fill="#0F172A"/>
  <text x="90" y="96" fill="#F8FAFC" font-size="42" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">MCP Architecture</text>
  <text x="90" y="138" fill="#CBD5E1" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif">Host 안의 Client가 MCP Server에 연결되어 Tools, Resources, Prompts를 가져오는 구조</text>
  <rect x="100" y="220" width="260" height="220" rx="28" fill="#1E293B" stroke="#38BDF8" stroke-width="3"/>
  <text x="180" y="300" fill="#F8FAFC" font-size="42" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">Host</text>
  <text x="150" y="350" fill="#CBD5E1" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif">IDE, 에이전트 앱, 채팅 도구</text>
  <rect x="420" y="250" width="240" height="160" rx="28" fill="#1E293B" stroke="#2DD4BF" stroke-width="3"/>
  <text x="492" y="337" fill="#F8FAFC" font-size="38" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">Client</text>
  <rect x="740" y="220" width="280" height="220" rx="28" fill="#1E293B" stroke="#A78BFA" stroke-width="3"/>
  <text x="816" y="300" fill="#F8FAFC" font-size="42" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">Server</text>
  <text x="790" y="350" fill="#CBD5E1" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif">도구와 자원을 노출</text>
  <rect x="1100" y="160" width="360" height="120" rx="24" fill="#1E293B" stroke="#F59E0B" stroke-width="3"/>
  <rect x="1100" y="320" width="360" height="120" rx="24" fill="#1E293B" stroke="#FB7185" stroke-width="3"/>
  <rect x="1100" y="480" width="360" height="120" rx="24" fill="#1E293B" stroke="#60A5FA" stroke-width="3"/>
  <text x="1237" y="230" text-anchor="middle" fill="#F8FAFC" font-size="36" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">Tools</text>
  <text x="1237" y="390" text-anchor="middle" fill="#F8FAFC" font-size="36" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">Resources</text>
  <text x="1237" y="550" text-anchor="middle" fill="#F8FAFC" font-size="36" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-weight="800">Prompts</text>
