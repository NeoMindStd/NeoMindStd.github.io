<script>
  (function () {
    var normalizeTimer = null;

    function isAdNode(node) {
      if (!(node instanceof HTMLElement)) return false;

      if (node.classList.contains("google-auto-placed")) return true;
      if (node.classList.contains("adsbygoogle")) return true;

      var id = node.id || "";
      if (id.indexOf("google_ads_iframe") === 0 || id.indexOf("aswift_") === 0) return true;

      if (node.tagName === "INS" && (node.dataset.adClient || node.dataset.adSlot || node.getAttribute("data-ad-format"))) {
        return true;
      }

      if (node.tagName === "IFRAME") {
        var src = node.getAttribute("src") || "";
        var name = node.getAttribute("name") || "";
        if (/googlesyndication|doubleclick|googleads/i.test(src)) return true;
        if (/google_ads_iframe|aswift/i.test(name)) return true;
      }

      return false;
    }

    function getAdRoot(node) {
      if (!(node instanceof HTMLElement)) return null;

      var autoPlaced = node.closest(".google-auto-placed");
      if (autoPlaced) return autoPlaced;

      var adSlot = node.closest("ins.adsbygoogle");
      if (adSlot) return adSlot;

      return isAdNode(node) ? node : null;
    }

    function isInsideCodeBlock(node) {
      return !!node.closest("figure.highlight, div.highlighter-rouge, pre, code");
    }

    function nearestCodeBlock(node) {
      return node.closest("figure.highlight, div.highlighter-rouge, pre");
    }

    function moveAdOutsideCode(node) {
      var adRoot = getAdRoot(node);
      if (!adRoot) return;
      if (!isInsideCodeBlock(adRoot)) return;
      if (adRoot.dataset.nmMovedFromCode === "1") return;

      var codeBlock = nearestCodeBlock(adRoot);
      if (!codeBlock || !codeBlock.parentNode) return;

      var adSlot = document.createElement("div");
      adSlot.className = "nm-inline-ad-slot nm-inline-ad-slot--from-code";
      adSlot.setAttribute("aria-label", "advertisement");

      codeBlock.insertAdjacentElement("afterend", adSlot);
      adSlot.appendChild(adRoot);
      adRoot.dataset.nmMovedFromCode = "1";
    }

    function collectAdRoots(root) {
      if (!(root instanceof HTMLElement)) return [];

      var adRoots = [];

      function pushUnique(node) {
        var adRoot = getAdRoot(node);
        if (!adRoot) return;
        if (adRoots.indexOf(adRoot) !== -1) return;
        adRoots.push(adRoot);
      }

      pushUnique(root);
      root.querySelectorAll(".google-auto-placed, ins.adsbygoogle, iframe, div[id^='google_ads_iframe'], div[id^='aswift_']").forEach(pushUnique);

      return adRoots;
    }

    function isHeading(node) {
      return !!(node && /^H[1-6]$/.test(node.tagName));
    }

    function isForbiddenAdArea(node) {
      if (!(node instanceof HTMLElement)) return false;

      return !!node.closest(
        ".page__meta, .page__taxonomy, .nm-post-hub-cta, .page__related, .sidebar, .sidebar__right, nav.toc, .toc, .author__content, .author__urls, .archive"
      );
    }

    function isMeaningfulFlowNode(node) {
      if (!(node instanceof HTMLElement)) return false;
      if (isAdNode(node) || node.classList.contains("nm-inline-ad-slot")) return false;
      if (isForbiddenAdArea(node)) return false;
      if (node.matches("script, style")) return false;
      if (node.hidden) return false;

      if (isHeading(node) || node.matches("hr, table, pre, figure, blockquote, ul, ol")) {
        return true;
      }

      if (node.querySelector("img, picture, svg, table, pre, blockquote, ul, ol, iframe, video")) {
        return true;
      }

      var text = (node.textContent || "").replace(/\s+/g, " ").trim();
      return text.length >= 20;
    }

    function previousMeaningfulSibling(node) {
      var current = node ? node.previousElementSibling : null;

      while (current) {
        if (isMeaningfulFlowNode(current)) return current;
        current = current.previousElementSibling;
      }

      return null;
    }

    function nextMeaningfulSibling(node) {
      var current = node ? node.nextElementSibling : null;

      while (current) {
        if (isMeaningfulFlowNode(current)) return current;
        current = current.nextElementSibling;
      }

      return null;
    }

    function hideManagedAd(node) {
      if (!(node instanceof HTMLElement)) return;

      node.dataset.nmHiddenByLayout = "1";
      node.style.setProperty("display", "none", "important");
    }

    function showManagedAd(node) {
      if (!(node instanceof HTMLElement)) return;
      if (node.dataset.nmHiddenByLayout !== "1") return;

      node.dataset.nmHiddenByLayout = "0";
      node.style.removeProperty("display");
    }

    function findSectionEndAfter(adRoot) {
      var cursor = nextMeaningfulSibling(adRoot);
      if (!cursor || isHeading(cursor)) return null;

      var last = cursor;
      var next = nextMeaningfulSibling(last);

      while (next) {
        if (isHeading(next) || next.matches("hr")) break;
        last = next;
        next = nextMeaningfulSibling(last);
      }

      return last;
    }

    function countMeaningfulBlocksBefore(node) {
      var count = 0;
      var current = node ? node.previousElementSibling : null;

      while (current) {
        if (isMeaningfulFlowNode(current)) {
          count += 1;
        }
        current = current.previousElementSibling;
      }

      return count;
    }

    function inlineAdLimit() {
      var width = window.innerWidth || document.documentElement.clientWidth || 1280;
      if (width <= 1024) return 1;
      return 2;
    }

    function minBlocksBeforeInlineAd() {
      var width = window.innerWidth || document.documentElement.clientWidth || 1280;
      if (width <= 768) return 6;
      if (width <= 1024) return 5;
      return 4;
    }

    function minBlockGapBetweenAds() {
      var width = window.innerWidth || document.documentElement.clientWidth || 1280;
      if (width <= 768) return 7;
      if (width <= 1024) return 6;
      return 5;
    }

    function normalizeArticleAds() {
      document.querySelectorAll("article.page").forEach(function (article) {
        var content = article.querySelector(".page__content");
        if (!content) return;

        var articleAds = collectAdRoots(article);
        articleAds.forEach(showManagedAd);

        articleAds.forEach(function (adRoot) {
          if (isForbiddenAdArea(adRoot)) {
            hideManagedAd(adRoot);
          }
        });

        var contentAds = collectAdRoots(content).filter(function (adRoot) {
          return adRoot.parentElement === content && adRoot.dataset.nmHiddenByLayout !== "1";
        });

        contentAds.forEach(function (adRoot) {
          var previousNode = previousMeaningfulSibling(adRoot);
          if (!previousNode) return;

          if (isHeading(previousNode)) {
            var target = findSectionEndAfter(adRoot);
            if (target) {
              target.insertAdjacentElement("afterend", adRoot);
            }
          }
        });

        contentAds = collectAdRoots(content).filter(function (adRoot) {
          return adRoot.parentElement === content;
        });

        var keptCount = 0;
        var lastKeptIndex = -999;
        var minBlocks = minBlocksBeforeInlineAd();
        var minGap = minBlockGapBetweenAds();
        var maxAds = inlineAdLimit();

        contentAds.forEach(function (adRoot) {
          var previousNode = previousMeaningfulSibling(adRoot);
          var meaningfulIndex = countMeaningfulBlocksBefore(adRoot);

          adRoot.classList.add("nm-inline-ad-slot", "nm-inline-ad-slot--managed");

          if (meaningfulIndex < minBlocks) {
            hideManagedAd(adRoot);
            return;
          }

          if (isHeading(previousNode)) {
            hideManagedAd(adRoot);
            return;
          }

          if (keptCount >= maxAds) {
            hideManagedAd(adRoot);
            return;
          }

          if (meaningfulIndex - lastKeptIndex < minGap) {
            hideManagedAd(adRoot);
            return;
          }

          showManagedAd(adRoot);
          keptCount += 1;
          lastKeptIndex = meaningfulIndex;
        });
      });
    }

    function scheduleNormalize() {
      window.clearTimeout(normalizeTimer);
      normalizeTimer = window.setTimeout(function () {
        scan(document.body);
        normalizeArticleAds();
      }, 80);
    }

    function scan(root) {
      if (!(root instanceof HTMLElement)) return;

      collectAdRoots(root).forEach(function (node) {
        moveAdOutsideCode(node);
      });
    }

    function init() {
      scan(document.body);
      normalizeArticleAds();

      var observer = new MutationObserver(function (mutations) {
        mutations.forEach(function (mutation) {
          mutation.addedNodes.forEach(function (node) {
            if (node instanceof HTMLElement) {
              scan(node);
            }
          });
        });

        scheduleNormalize();
      });

      observer.observe(document.body, { childList: true, subtree: true });

      window.addEventListener("resize", scheduleNormalize);

      // Auto ads can appear a bit later than DOMContentLoaded.
      [400, 1200, 3000].forEach(function (delay) {
        setTimeout(scheduleNormalize, delay);
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init, { once: true });
    } else {
      init();
    }
  })();
</script>

<script>
  (function () {
    var storageKey = "nm-theme-preference";
    var mediaQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;

    function getStoredTheme() {
      try {
        return localStorage.getItem(storageKey);
      } catch (error) {
        return null;
      }
    }

    function setStoredTheme(theme) {
      try {
        localStorage.setItem(storageKey, theme);
      } catch (error) {
        // Ignore storage errors and continue with in-memory behavior.
      }
    }

    function resolveTheme(storedTheme) {
      if (storedTheme === "light" || storedTheme === "dark") {
        return storedTheme;
      }

      if (mediaQuery && mediaQuery.matches) {
        return "dark";
      }

      return "light";
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.style.colorScheme = theme;
    }

    function updateThemeButtons(theme) {
      var nextTitle = theme === "dark" ? "라이트 모드로 전환" : "다크 모드로 전환";
      var nextIcon = theme === "dark" ? "☀" : "🌙";

      document.querySelectorAll("[data-theme-toggle]").forEach(function (button) {
        button.setAttribute("aria-label", nextTitle);
        button.setAttribute("title", nextTitle);

        var icon = button.querySelector(".theme-toggle__icon");
        if (icon) {
          icon.textContent = nextIcon;
        }
      });
    }

    function syncWithPreference() {
      var storedTheme = getStoredTheme();
      var resolved = resolveTheme(storedTheme);
      applyTheme(resolved);
      updateThemeButtons(resolved);
    }

    function bindThemeToggle() {
      document.querySelectorAll("[data-theme-toggle]").forEach(function (button) {
        button.addEventListener("click", function () {
          var current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
          var next = current === "dark" ? "light" : "dark";

          setStoredTheme(next);
          applyTheme(next);
          updateThemeButtons(next);
        });
      });
    }

    if (mediaQuery) {
      var onSystemThemeChanged = function () {
        var storedTheme = getStoredTheme();
        if (storedTheme !== "light" && storedTheme !== "dark") {
          syncWithPreference();
        }
      };

      if (typeof mediaQuery.addEventListener === "function") {
        mediaQuery.addEventListener("change", onSystemThemeChanged);
      } else if (typeof mediaQuery.addListener === "function") {
        mediaQuery.addListener(onSystemThemeChanged);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        syncWithPreference();
        bindThemeToggle();
      }, { once: true });
    } else {
      syncWithPreference();
      bindThemeToggle();
    }
  })();
</script>
